name: TerraNova Notion -> GitHub Export

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: tnv-notion-to-github
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run export
        env:
          NOTION_TOKEN: { secrets.NOTION_TOKEN 
          NOTION_DATABASE_ID_CHANGES: { secrets.NOTION_DATABASE_ID_CHANGES 
          NOTION_VERSION: "2022-06-28"
          GITHUB_REPO: "q9yx7n64w7-creator/TerraNova-s-Framework"
          GITHUB_TOKEN: { secrets.GH_PAT 
        run: 
          python scripts/notion_to_github.py
