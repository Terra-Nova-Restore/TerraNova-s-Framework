name: TerraNova Notion -> GitHub Export

on:permissions:
  contents: write
  issues: write

  workflow_dispatch:
  schedule:
    # every 10 minutes
    - cron: "*/10 * * * *"

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run export
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID_CHANGES: ${{ secrets.NOTION_DATABASE_ID_CHANGES }}
          NOTION_VERSION: "2022-06-28"
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: ${{ github.repository }}
          PROJECT_STATUS_FIELD_NAME: "Status"
          PROJECT_STATUS_OPTION_NAME: "Todo"
        run: |
          python scripts/notion_to_github.py
