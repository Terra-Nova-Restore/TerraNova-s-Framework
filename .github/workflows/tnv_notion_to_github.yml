name: TNV – Notion → GitHub Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: tnv-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies (deterministic)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Export secrets
        run: |
          echo "NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}" >> $GITHUB_ENV
          echo "NOTION_DATABASE_ID_CHANGES=${{ secrets.NOTION_DATABASE_ID_CHANGES }}" >> $GITHUB_ENV
          echo "GH_PAT=${{ secrets.GH_PAT }}" >> $GITHUB_ENV
          echo "GITHUB_REPO=${{ secrets.GITHUB_REPO || secrets.GH_REPO }}" >> $GITHUB_ENV

      - name: Run Notion → GitHub sync
        id: sync
        run: |
          python scripts/notion_to_github.py \
            --mode full \
            --shadow shadow/ \
            --log logs/ \
            --hash-out .tnv_hash \
            --config config/notion_map.json

      - name: Detect changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          HASH=$(cat .tnv_hash)
          git config user.name "TNV-Automaton"
          git config user.email "actions@github.com"
          git add .
          git commit -m "TNV-AUTO: Notion Sync (hash: $HASH)"
          git push
